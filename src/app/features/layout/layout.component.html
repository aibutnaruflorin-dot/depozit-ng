<mat-sidenav-container class="app-container">

  <!-- ══════ SIDEBAR ══════ -->
  <mat-sidenav #sidenav
    [mode]="isMobile ? 'over' : 'side'"
    [opened]="!isMobile && !isMobileRoute"
    class="app-sidenav">

    <!-- Brand -->
    <div class="sidebar-brand">
      <span class="brand-icon-box">
        <mat-icon>cottage</mat-icon>
      </span>
      <span class="brand-name">D2C</span>
      @if (isMobile) {
        <button mat-icon-button class="close-btn" (click)="sidenav.close()" aria-label="Închide">
          <mat-icon>close</mat-icon>
        </button>
      }
    </div>

    <mat-divider />

    <!-- Navigation -->
    <mat-nav-list class="sidebar-nav">
      @for (item of visibleNavItems; track item.route) {
        <mat-list-item
          [class.active]="isActive(item.route)"
          (click)="navigate(item.route)"
          [attr.aria-current]="isActive(item.route) ? 'page' : null">
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
        </mat-list-item>
      }

      <!-- Contul meu + Despre — mereu vizibile -->
      <mat-divider style="margin: 0.5rem 0" />
      <mat-list-item
        [class.active]="isActive('/app/account')"
        (click)="navigate('/app/account')"
        [attr.aria-current]="isActive('/app/account') ? 'page' : null">
        <mat-icon matListItemIcon>manage_accounts</mat-icon>
        <span matListItemTitle>Contul meu</span>
      </mat-list-item>
      <mat-list-item
        [class.active]="isActive('/app/about')"
        (click)="navigate('/app/about')"
        [attr.aria-current]="isActive('/app/about') ? 'page' : null">
        <mat-icon matListItemIcon>info_outline</mat-icon>
        <span matListItemTitle>Despre aplicație</span>
      </mat-list-item>
    </mat-nav-list>

    <!-- User footer -->
    <div class="sidebar-footer">
      <mat-divider />
      <div class="user-info">
        <div class="user-avatar">{{ auth.userInitial() }}</div>
        <div class="user-details">
          <div class="user-name">{{ auth.userName() }}</div>
          <div class="user-role">{{ auth.roleLabel() }}</div>
        </div>
      </div>
      <button mat-stroked-button class="logout-btn" (click)="logout()">
        <mat-icon>logout</mat-icon>
        Deconectare
      </button>
    </div>

    <!-- Company logo — apare doar dacă logo.png există -->
    <div class="sidebar-logo">
      <img src="logo.png" alt="depozit2 constructii" class="company-logo">
    </div>
  </mat-sidenav>

  <!-- ══════ MAIN CONTENT ══════ -->
  <mat-sidenav-content class="app-content">

    <!-- Top toolbar — ascuns pe rutele mobile -->
    @if (!isMobileRoute) {
      <mat-toolbar class="app-toolbar">
        @if (isMobile) {
          <button mat-icon-button (click)="sidenav.open()" aria-label="Deschide meniu">
            <mat-icon>menu</mat-icon>
          </button>
        }
        <span class="toolbar-spacer"></span>
        <button mat-icon-button (click)="toggleTheme()"
          [matTooltip]="darkMode() ? 'Mod luminos' : 'Mod întunecat'"
          aria-label="Comută tema">
          <mat-icon>{{ darkMode() ? 'light_mode' : 'dark_mode' }}</mat-icon>
        </button>
      </mat-toolbar>
    }

    <!-- Page content -->
    <div class="page-content" [class.mobile-route]="isMobileRoute">
      <router-outlet />
    </div>
  </mat-sidenav-content>

</mat-sidenav-container>
